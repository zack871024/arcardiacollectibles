<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcardia One Piece TCG Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: min(90%, 900px);
            max-width: 900px;
            margin: 0 auto;
            overflow-y: auto;
            max-height: calc(100vh - 32px);
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-row input {
            flex: 1;
            min-width: 0;
        }

        .clear-button {
            padding: 10px;
            border: none;
            background: #FF4D4D;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .results {
            text-align: left;
            max-height: 560px;
            overflow-y: auto;
        }

        .card {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }

        .card img {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border: 1px solid #ddd;
            flex-shrink: 0;
        }

        .card > div {
            min-width: 0;
        }


        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 15px;
        }

        .pagination button {
            padding: 8px 12px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            border-radius: 3px;
        }

        .pagination button.active {
            background: #007bff;
            color: white;
        }

        .pagination button:hover {
            background: #f0f0f0;
        }

        .result-info {
            font-size: 12px;
            color: #666;
            margin: 10px 0;
        }

        @media (max-width: 600px) {
            body {
                padding: 8px;
            }

            .container {
                width: 100%;
                max-width: none;
                padding: 12px;
                max-height: none;
                overflow: visible;
            }

            .search-row {
                flex-wrap: wrap;
            }

            .search-row input,
            .clear-button {
                width: 100%;
            }

            .results {
                max-height: none;
                overflow: visible;
            }

            .card {
                flex-direction: column;
                align-items: flex-start;
            }

            .card img {
                width: 48px;
                height: 64px;
            }

            .pagination {
                flex-wrap: wrap;
            }

            .pagination button {
                padding: 6px 10px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Arcardia One Piece TCG Search Engine</h2>

        <!-- Category dropdown -->
        <select id="categorySelect">
            <option value="">All Sets</option>
        </select>

        <!-- Search bar -->
        <div class="search-row">
            <input type="text" id="searchBar" placeholder="Search by Name or OPXX-XXX...">
            <button id="clearSearch" class="clear-button">
                Clear
            </button>
        </div>

        <!-- Results -->
        <div class="results" id="resultsContainer"></div>
    </div>

    <script>
        let cards = [];
        let cart = [];
        let latestSet = "";
        let currentResults = [];
        let currentPage = 1;
        const RESULTS_PER_PAGE = 24;
        let searchTimeout;

        async function loadCards() {
            const response = await fetch('search_database.csv?t=' + Date.now());
            const csvText = await response.text();
            cards = parseCSV(csvText);

            populateCategories(cards);
            showAllSets();
        }

        function parseCSV(csvText) {
            const rows = csvText.trim().split('\n');
            const headers = rows[0].split(',').map(h => h.trim());

            return rows.slice(1).map(row => {
                const values = row.split(',').map(v => v.trim());
                let entry = {};
                headers.forEach((header, index) => entry[header] = values[index] || '');
                return entry;
            });
        }

        function populateCategories(cards) {
            const categorySelect = document.getElementById("categorySelect");
            const categories = new Set();

            cards.forEach(card => {
                const match = card.extNumber.match(/^([A-Z]+)(\d{2})/i);
                if (match) categories.add(match[1].toUpperCase() + match[2]);
            });

            const sortedCategories = Array.from(categories).sort(customSetSort);

            // determine latest
            latestSet = sortedCategories[sortedCategories.length - 1];

            // clear and rebuild dropdown
            categorySelect.innerHTML = '<option value="">All Sets</option>';
            sortedCategories.forEach(cat => {
                const option = document.createElement("option");
                option.value = cat;
                option.textContent = (cat === latestSet) ? `${cat} (Latest)` : cat;
                categorySelect.appendChild(option);
            });
        }

        function customSetSort(a, b) {
            const matchA = a.match(/^([A-Z]+)(\d{2})$/);
            const matchB = b.match(/^([A-Z]+)(\d{2})$/);
            if (!matchA || !matchB) return a.localeCompare(b);
            const [ , prefixA, numA ] = matchA;
            const [ , prefixB, numB ] = matchB;
            if (prefixA === prefixB) {
                return parseInt(numA) - parseInt(numB);
            }
            return prefixA.localeCompare(prefixB);
        }

        function showAllSets() {
            document.getElementById('categorySelect').value = '';
            currentPage = 1;
            displayResults(cards);
        }

        function searchCards(query) {
            // Debounce search
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                query = query.toLowerCase();
                const category = document.getElementById("categorySelect").value;

                const results = cards.filter(card => {
                    const matchesQuery =
                        !query || card.name.toLowerCase().includes(query) || card.extNumber.toLowerCase().includes(query);

                    const matchesCategory = category
                        ? card.extNumber.toUpperCase().startsWith(category.toUpperCase())
                        : true;

                    return matchesCategory && matchesQuery;
                });

                currentPage = 1;
                currentResults = results;
                displayResults(results);
            }, 300);
        }

        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            
            if (results.length === 0) {
                container.innerHTML = '<p>No cards found.</p>';
                return;
            }

            // Calculate pagination
            const totalPages = Math.ceil(results.length / RESULTS_PER_PAGE);
            const start = (currentPage - 1) * RESULTS_PER_PAGE;
            const end = start + RESULTS_PER_PAGE;
            const pagedResults = results.slice(start, end);

            // Add result info
            const infoDiv = document.createElement('div');
            infoDiv.classList.add('result-info');
            infoDiv.innerText = `Showing ${start + 1}-${Math.min(end, results.length)} of ${results.length} cards`;
            container.appendChild(infoDiv);

            const pageInfoDiv = document.createElement('div');
            pageInfoDiv.classList.add('result-info');
            pageInfoDiv.innerText = `Page ${currentPage} of ${totalPages}`;
            container.appendChild(pageInfoDiv);

            // Render cards for current page
            pagedResults.forEach(card => {
                const cardDiv = document.createElement('div');
                const usdPrice = parseFloat(card.marketPrice);
                const cadPrice = (usdPrice * 1.5).toFixed(2);

                cardDiv.classList.add('card');
                cardDiv.innerHTML = `
                    <img src="${card.imageUrl}" alt="${card.name}">
                    <div>
                        <p>
                            <strong>
                                <a href="${card.url}" target="_blank" style="text-decoration:none; color:#007bff;">
                                    ${card.name}
                                </a>
                            </strong> 
                            (${card.extNumber})
                        </p>
                        <p>Price: $${usdPrice.toFixed(2)} USD (CAD: $${cadPrice})</p>
                    </div>
                `;
                container.appendChild(cardDiv);
            });

            // Add simplified pagination controls
            if (totalPages > 1) {
                const paginationDiv = document.createElement('div');
                paginationDiv.classList.add('pagination');

                const prevBtn = document.createElement('button');
                prevBtn.textContent = 'Prev';
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => {
                    if (currentPage > 1) {
                        currentPage -= 1;
                        displayResults(results);
                        document.querySelector('.results').scrollTop = 0;
                    }
                };
                paginationDiv.appendChild(prevBtn);

                const pageNumbers = totalPages <= 4
                    ? Array.from({ length: totalPages }, (_, i) => i + 1)
                    : currentPage <= 3
                        ? [1, 2, 3, '...', totalPages]
                        : currentPage >= totalPages - 1
                            ? [1, '...', totalPages - 2, totalPages - 1, totalPages]
                            : [1, '...', currentPage - 1, currentPage, currentPage + 1, '...', totalPages];

                pageNumbers.forEach(page => {
                    if (page === '...') {
                        const dots = document.createElement('span');
                        dots.textContent = '…';
                        dots.style.padding = '8px 4px';
                        paginationDiv.appendChild(dots);
                        return;
                    }

                    const btn = document.createElement('button');
                    btn.textContent = page;
                    if (page === currentPage) btn.classList.add('active');
                    btn.onclick = () => {
                        currentPage = Number(page);
                        displayResults(results);
                        document.querySelector('.results').scrollTop = 0;
                    };
                    paginationDiv.appendChild(btn);
                });

                const nextBtn = document.createElement('button');
                nextBtn.textContent = 'Next';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => {
                    if (currentPage < totalPages) {
                        currentPage += 1;
                        displayResults(results);
                        document.querySelector('.results').scrollTop = 0;
                    }
                };
                paginationDiv.appendChild(nextBtn);

                container.appendChild(paginationDiv);
            }
        }
        // Event listeners
        document.getElementById('searchBar').addEventListener('input', e => searchCards(e.target.value));
        document.getElementById('categorySelect').addEventListener('change', () => {
            const query = document.getElementById('searchBar').value;
            searchCards(query);
        });

        document.getElementById('clearSearch').addEventListener('click', () => {
            document.getElementById('searchBar').value = '';
            showAllSets();
        });

        loadCards();
    </script>

</body>
</html>
