<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcardia One Piece TCG Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 90%;
            margin: 20px;
            overflow-y: auto;
            max-height: 90vh;
        }

        select,
        input[type="text"] {
            width: calc(100% - 20px);
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .results {
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
        }

        .card {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .card img {
            width: 60px;
            height: 80px;
            object-fit: cover;
            margin-right: 10px;
            border: 1px solid #ddd;
        }


        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 15px;
        }

        .pagination button {
            padding: 8px 12px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            border-radius: 3px;
        }

        .pagination button.active {
            background: #007bff;
            color: white;
        }

        .pagination button:hover {
            background: #f0f0f0;
        }

        .result-info {
            font-size: 12px;
            color: #666;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Arcardia One Piece TCG Search Engine</h2>

        <!-- Category dropdown -->
        <select id="categorySelect">
            <option value="">All Sets</option>
        </select>

        <!-- Search bar -->
        <div style="display:flex; gap:10px; align-items:center;">
            <input type="text" id="searchBar" placeholder="Search by Name or OPXX-XXX..." style="flex:1;">
            <button id="clearSearch"
                style="padding:10px; border:none; background:#FF4D4D; color:white; border-radius:5px; cursor:pointer;">
                Clear
            </button>
        </div>

        <!-- Results -->
        <div class="results" id="resultsContainer"></div>
    </div>

    <script>
        let cards = [];
        let cart = [];
        let latestSet = "";
        let currentResults = [];
        let currentPage = 1;
        const RESULTS_PER_PAGE = 20;
        let searchTimeout;

        async function loadCards() {
            const response = await fetch('search_database.csv?t=' + Date.now());
            const csvText = await response.text();
            cards = parseCSV(csvText);

            populateCategories(cards);
            showAllSets();
        }

        function parseCSV(csvText) {
            const rows = csvText.trim().split('\n');
            const headers = rows[0].split(',').map(h => h.trim());

            return rows.slice(1).map(row => {
                const values = row.split(',').map(v => v.trim());
                let entry = {};
                headers.forEach((header, index) => entry[header] = values[index] || '');
                return entry;
            });
        }

        function populateCategories(cards) {
            const categorySelect = document.getElementById("categorySelect");
            const categories = new Set();

            cards.forEach(card => {
                const match = card.extNumber.match(/^([A-Z]+)(\d{2})/i);
                if (match) categories.add(match[1].toUpperCase() + match[2]);
            });

            const sortedCategories = Array.from(categories).sort(customSetSort);

            // determine latest
            latestSet = sortedCategories[sortedCategories.length - 1];

            // clear and rebuild dropdown
            categorySelect.innerHTML = '<option value="">All Sets</option>';
            sortedCategories.forEach(cat => {
                const option = document.createElement("option");
                option.value = cat;
                option.textContent = (cat === latestSet) ? `${cat} (Latest)` : cat;
                categorySelect.appendChild(option);
            });
        }

        function customSetSort(a, b) {
            const matchA = a.match(/^([A-Z]+)(\d{2})$/);
            const matchB = b.match(/^([A-Z]+)(\d{2})$/);
            if (!matchA || !matchB) return a.localeCompare(b);
            const [ , prefixA, numA ] = matchA;
            const [ , prefixB, numB ] = matchB;
            if (prefixA === prefixB) {
                return parseInt(numA) - parseInt(numB);
            }
            return prefixA.localeCompare(prefixB);
        }

        function showAllSets() {
            document.getElementById('categorySelect').value = '';
            currentPage = 1;
            displayResults(cards);
        }

        function searchCards(query) {
            // Debounce search
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                query = query.toLowerCase();
                const category = document.getElementById("categorySelect").value;

                const results = cards.filter(card => {
                    const matchesQuery =
                        !query || card.name.toLowerCase().includes(query) || card.extNumber.toLowerCase().includes(query);

                    const matchesCategory = category
                        ? card.extNumber.toUpperCase().startsWith(category.toUpperCase())
                        : true;

                    return matchesCategory && matchesQuery;
                });

                currentPage = 1;
                currentResults = results;
                displayResults(results);
            }, 300);
        }

        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            
            if (results.length === 0) {
                container.innerHTML = '<p>No cards found.</p>';
                return;
            }

            // Calculate pagination
            const totalPages = Math.ceil(results.length / RESULTS_PER_PAGE);
            const start = (currentPage - 1) * RESULTS_PER_PAGE;
            const end = start + RESULTS_PER_PAGE;
            const pagedResults = results.slice(start, end);

            // Add result info
            const infoDiv = document.createElement('div');
            infoDiv.classList.add('result-info');
            infoDiv.innerText = `Showing ${start + 1}-${Math.min(end, results.length)} of ${results.length} cards`;
            container.appendChild(infoDiv);

            // Render cards for current page
            pagedResults.forEach(card => {
                const cardDiv = document.createElement('div');
                const usdPrice = parseFloat(card.marketPrice);
                const cadPrice = (usdPrice * 1.5).toFixed(2);

                cardDiv.classList.add('card');
                cardDiv.innerHTML = `
                    <img src="${card.imageUrl}" alt="${card.name}">
                    <div>
                        <p>
                            <strong>
                                <a href="${card.url}" target="_blank" style="text-decoration:none; color:#007bff;">
                                    ${card.name}
                                </a>
                            </strong> 
                            (${card.extNumber})
                        </p>
                        <p>Price: $${usdPrice.toFixed(2)} USD (CAD: $${cadPrice})</p>
                    </div>
                `;
                container.appendChild(cardDiv);
            });

            // Add pagination controls if needed
            if (totalPages > 1) {
                const paginationDiv = document.createElement('div');
                paginationDiv.classList.add('pagination');

                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    if (i === currentPage) btn.classList.add('active');
                    btn.onclick = () => {
                        currentPage = i;
                        displayResults(results);
                        document.querySelector('.results').scrollTop = 0;
                    };
                    paginationDiv.appendChild(btn);
                }

                container.appendChild(paginationDiv);
            }
        }
        // Event listeners
        document.getElementById('searchBar').addEventListener('input', e => searchCards(e.target.value));
        document.getElementById('categorySelect').addEventListener('change', () => {
            const query = document.getElementById('searchBar').value;
            searchCards(query);
        });

        document.getElementById('clearSearch').addEventListener('click', () => {
            document.getElementById('searchBar').value = '';
            showAllSets();
        });

        loadCards();
    </script>

</body>
</html>
